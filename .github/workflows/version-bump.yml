name: version-bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (leave blank to auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  create-release-tag:
    name: create release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          # A PAT (or GitHub App token) is required so that the tag push
          # triggers the release workflow. The default GITHUB_TOKEN
          # deliberately does not trigger downstream workflows.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: checkout main
        run: git checkout main
      - name: run release script
        run: scripts/release.sh ${{ inputs.bump }}
