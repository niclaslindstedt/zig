name: release

on:
  workflow_run:
    workflows: ["version-bump"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-repo:
    name: update changelog
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      release_notes: ${{ steps.notes.outputs.release_notes }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: extract version
        id: version
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 --match 'v*')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: checkout tag
        run: git checkout "${{ steps.version.outputs.tag }}"
      - name: generate changelog
        run: scripts/generate-changelog.sh "${{ steps.version.outputs.version }}"
      - name: extract release notes
        id: notes
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "release_notes<<$EOF" >> "$GITHUB_OUTPUT"
          sed -n "/^## \[${{ steps.version.outputs.version }}\]/,/^## \[/{ /^## \[.*\]/!p; }" CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - name: commit changelog and retag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update changelog for ${TAG}"
          fi
          # Fast-forward main to include the changelog commit.
          git push origin HEAD:main
          # Move the tag to the new commit so build/publish use the updated sources.
          git tag -f -a "${TAG}" -m "Release ${TAG}"
          git push origin -f "refs/tags/${TAG}"

  build:
    name: build (${{ matrix.target }})
    needs: update-repo
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.update-repo.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin zig
          else
            cargo build --release --target ${{ matrix.target }} --bin zig
          fi
        shell: bash
      - name: package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../zig-${{ matrix.target }}.tar.gz zig
          cd ../../..
          sha256sum zig-${{ matrix.target }}.tar.gz > zig-${{ matrix.target }}.tar.gz.sha256
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/zig.exe" -DestinationPath "zig-${{ matrix.target }}.zip"
          (Get-FileHash "zig-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  zig-${{ matrix.target }}.zip" | Out-File "zig-${{ matrix.target }}.zip.sha256" -Encoding ascii
      - name: upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: zig-${{ matrix.target }}
          path: |
            zig-${{ matrix.target }}.tar.gz
            zig-${{ matrix.target }}.tar.gz.sha256
            zig-${{ matrix.target }}.zip
            zig-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: github release
    needs: [update-repo, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.update-repo.outputs.tag }}
          body: ${{ needs.update-repo.outputs.release_notes }}
          files: artifacts/*
          generate_release_notes: false

  publish-crates:
    name: publish crates
    needs: [update-repo, release]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.update-repo.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: publish zig-core
        run: cargo publish -p zig-core --token "${{ secrets.CRATES_TOKEN }}"
      - name: wait for crates.io
        run: sleep 30
      - name: publish zig-cli
        run: cargo publish -p zig-cli --token "${{ secrets.CRATES_TOKEN }}"

  publish-npm:
    name: publish npm
    needs: [update-repo, build]
    runs-on: ubuntu-latest
    environment: npm-registry
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.update-repo.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: install dependencies
        working-directory: bindings/typescript
        run: npm install

      - name: publish zig-workflow
        working-directory: bindings/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
