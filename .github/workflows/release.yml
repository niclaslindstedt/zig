name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-repo:
    name: update changelog and versions
    runs-on: ubuntu-latest
    outputs:
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: update versions
        run: scripts/update-versions.sh "${{ steps.version.outputs.version }}"
      - name: generate changelog
        run: scripts/generate-changelog.sh "${{ steps.version.outputs.version }}"
      - name: extract release notes
        id: notes
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "release_notes<<$EOF" >> "$GITHUB_OUTPUT"
          sed -n "/^## \[${{ steps.version.outputs.version }}\]/,/^## \[/{ /^## \[.*\]/!p; }" CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - name: commit changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: update versions and changelog for ${{ github.ref_name }}"
          git push origin HEAD:main || true

  build:
    name: build (${{ matrix.target }})
    needs: update-repo
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin zig
          else
            cargo build --release --target ${{ matrix.target }} --bin zig
          fi
        shell: bash
      - name: package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../zig-${{ matrix.target }}.tar.gz zig
          cd ../../..
          sha256sum zig-${{ matrix.target }}.tar.gz > zig-${{ matrix.target }}.tar.gz.sha256
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/zig.exe" -DestinationPath "zig-${{ matrix.target }}.zip"
          (Get-FileHash "zig-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  zig-${{ matrix.target }}.zip" | Out-File "zig-${{ matrix.target }}.zip.sha256" -Encoding ascii
      - name: upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: zig-${{ matrix.target }}
          path: |
            zig-${{ matrix.target }}.tar.gz
            zig-${{ matrix.target }}.tar.gz.sha256
            zig-${{ matrix.target }}.zip
            zig-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: github release
    needs: [update-repo, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.update-repo.outputs.release_notes }}
          files: artifacts/*
          generate_release_notes: false

  publish-crates:
    name: publish crates
    needs: release
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: publish zig-core
        run: cargo publish -p zig-core --token "${{ secrets.CRATES_TOKEN }}"
      - name: wait for crates.io
        run: sleep 30
      - name: publish zig-cli
        run: cargo publish -p zig-cli --token "${{ secrets.CRATES_TOKEN }}"
