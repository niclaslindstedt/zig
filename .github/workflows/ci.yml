name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --workspace
        env:
          CARGO_INCREMENTAL: 0

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  publish-verify:
    name: publish verify
    runs-on: ubuntu-latest
    # Simulates `cargo publish` for each workspace crate without
    # hitting crates.io. Catches bugs like relative-path references
    # (e.g. `#[folder = "../web/dist/"]`) that compile fine under
    # `cargo check` but break at publish time because the tarball is
    # extracted in isolation. See scripts/verify-publish.sh.
    #
    # Skipped on version-bump commits because the new zig-core
    # version isn't on crates.io yet, and cargo's "prepare for
    # uploading" step does an independent registry resolve when
    # packaging zig-serve that ignores `[patch.crates-io]`. The
    # source changes already ran through this check on the PR that
    # landed before the bump, and `release.yml` publishes zig-core
    # before zig-serve with a sleep in between, so publish ordering
    # is handled at release time.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: bump version to') && !startsWith(github.event.pull_request.title, 'chore: bump version to') }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: scripts/verify-publish.sh
