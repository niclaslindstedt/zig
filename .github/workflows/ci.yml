name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# Default to no permissions — every job declares its own least-privilege
# scopes (OSS_SPEC §10.3).
permissions: {}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: make build

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: make test
        env:
          CARGO_INCREMENTAL: 0

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: make lint

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt
      - run: make fmt-check

  # Lint workflow YAML with actionlint and shell scripts with
  # shellcheck. Catches invalid action pins, bad expressions,
  # quoting bugs, and SC-class issues in `scripts/*.sh` before
  # they hit `main`. (shellcheck is preinstalled on ubuntu-latest.)
  shell-lint:
    name: shell-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: actionlint
        run: actionlint -color
      - name: make shellcheck
        run: make shellcheck

  publish-verify:
    name: publish verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Runs `cargo package --workspace` to simulate publishing every
    # crate. Catches bugs like relative-path references
    # (e.g. `#[folder = "../web/dist/"]`) that compile fine under
    # `cargo check` but break at publish time because the tarball is
    # extracted in isolation. See scripts/verify-publish.sh.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: scripts/verify-publish.sh
